name: Update Site

on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - "stories/**"
      - "index.html"
      - "style.css"
      - "script.js"
      - "generate-story-manifest.py"
      - "minify.py"
      - "optimize-images.py"
      - "fetch-goodreads.py"
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC — refreshes Goodreads ratings
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Regenerate story pages & optimise images ─────────────────────────────
  update-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install Pillow rcssmin rjsmin --quiet

      - name: Fetch Goodreads ratings
        run: python fetch-goodreads.py
        continue-on-error: true   # never break the build if Goodreads is down

      - name: Optimise book images
        run: python optimize-images.py

      - name: Generate story manifest & pages
        run: python generate-story-manifest.py

      - name: Minify CSS & JS
        run: python minify.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/ story-manifest.json story-dates.json stories/ goodreads-ratings.js style.min.css theme.min.js geo-links.min.js blood.min.js goodreads-ratings.min.js script.min.js
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: update story pages & optimise images [skip ci]"
            git push
          fi

  # ── 2. Deploy to GitHub Pages ───────────────────────────────────────────────
  deploy:
    needs: update-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (with latest commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
